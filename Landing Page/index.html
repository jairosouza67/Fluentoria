<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0B0B0B" />
  <meta name="description" content="Fluentoria - Aprenda inglês enquanto faz suas atividades diárias. Método revolucionário de aprendizado prático." />
  <title>Fluentoria - Aprenda Inglês de Forma Prática</title>
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://fluentoria.com/" />
  <meta property="og:title" content="Fluentoria - Aprenda Inglês de Forma Prática" />
  <meta property="og:description" content="Transforme tarefas diárias em poderosas aulas de inglês. Método prático que se adapta à sua rotina." />
  <meta property="og:image" content="https://fluentoria.com/og-image.jpg" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://fluentoria.com/" />
  <meta property="twitter:title" content="Fluentoria - Aprenda Inglês de Forma Prática" />
  <meta property="twitter:description" content="Transforme tarefas diárias em poderosas aulas de inglês. Método prático que se adapta à sua rotina." />
  <meta property="twitter:image" content="https://fluentoria.com/og-image.jpg" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],
          },
          colors: {
            background: '#0B0B0B',
            foreground: '#F3F4F6',
            card: '#111111',
            primary: '#FF6A00',
            muted: '#9CA3AF',
            border: 'rgba(255, 255, 255, 0.06)',
          },
          borderRadius: {
            'lg': '20px',
            'md': '12px',
            'sm': '8px',
          },
          boxShadow: {
            'elevated': '0 8px 30px rgba(0,0,0,0.6)',
            'card': '0 6px 18px rgba(0,0,0,0.55)',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'fade-in': 'fadeIn 0.5s ease-out forwards',
          },
          keyframes: {
            float: {
              '0%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' },
              '100%': { transform: 'translateY(0px)' },
            },
            fadeIn: {
              'from': { opacity: '0', transform: 'translateY(10px)' },
              'to': { opacity: '1', transform: 'translateY(0)' },
            },
          },
        },
      },
    }
  </script>

  <!-- Custom Styles -->
  <style>
    body {
      background-color: #0B0B0B;
      color: #F3F4F6;
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* Animations */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .animate-float {
      animation: float 6s ease-in-out infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
  </style>
</head>
<body class="min-h-screen bg-[#0B0B0B] text-[#F3F4F6] overflow-x-hidden">
  <div id="root"></div>
  
  <!-- Lucide React Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Main App Script -->
  <script type="module" src="app.js"></script>
</body>
</html>
